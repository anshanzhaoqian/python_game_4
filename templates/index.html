<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石头剪刀布 - 多轮对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 2.2em;
            margin-bottom: 8px;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        /* 对战区域 */
        .battle-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            min-height: 120px;
        }

        .choice-display {
            text-align: center;
            flex: 1;
        }

        .choice-label {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .choice-emoji {
            font-size: 4em;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .choice-emoji.winner {
            animation: pulse 0.6s ease-in-out;
            transform: scale(1.25);
        }

        .choice-emoji.loser {
            opacity: 0.5;
            transform: scale(0.85);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.25); }
            50% { transform: scale(1.4); }
        }

        .vs-divider {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd200;
            text-shadow: 0 0 20px rgba(255, 210, 0, 0.5);
        }

        .result-text {
            text-align: center;
            font-size: 1.4em;
            margin-bottom: 25px;
            min-height: 36px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .result-text.win { color: #4caf50; }
        .result-text.lose { color: #f44336; }
        .result-text.draw { color: #ff9800; }

        /* 选择按钮 */
        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            font-size: 2.5em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #fff;
        }

        .choice-btn:hover {
            border-color: #ffd200;
            background: rgba(255, 210, 0, 0.15);
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(255, 210, 0, 0.3);
        }

        .choice-btn:active {
            transform: scale(0.9);
        }

        .choice-btn .btn-label {
            font-size: 0.35em;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 1.6em;
            font-weight: bold;
            display: block;
        }

        .stat-value.win-count { color: #4caf50; }
        .stat-value.lose-count { color: #f44336; }
        .stat-value.draw-count { color: #ff9800; }
        .stat-value.win-rate { color: #42a5f5; }

        .stat-label {
            font-size: 0.78em;
            color: #999;
            margin-top: 2px;
        }

        /* 进度条 */
        .win-rate-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .win-rate-fill {
            height: 100%;
            background: linear-gradient(90deg, #42a5f5, #66bb6a);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 历史记录 */
        .history-section {
            margin-bottom: 20px;
        }

        .history-title {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.9em;
            border-left: 3px solid transparent;
        }

        .history-item.win { border-left-color: #4caf50; }
        .history-item.lose { border-left-color: #f44336; }
        .history-item.draw { border-left-color: #ff9800; }

        .history-round {
            color: #777;
            font-size: 0.8em;
            min-width: 40px;
        }

        .history-detail {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .history-result {
            font-weight: bold;
            font-size: 0.85em;
            min-width: 36px;
            text-align: right;
        }

        .history-result.win { color: #4caf50; }
        .history-result.lose { color: #f44336; }
        .history-result.draw { color: #ff9800; }

        /* 按钮 */
        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: rgba(244, 67, 54, 0.25);
            border-color: #f44336;
            color: #fff;
        }

        /* 连胜提示 */
        .streak-badge {
            display: none;
            text-align: center;
            margin-bottom: 15px;
            padding: 8px 20px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            color: #000;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            animation: slideDown 0.5s ease;
        }

        .streak-badge.show {
            display: inline-block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            h1 { font-size: 1.6em; }
            .choice-emoji { font-size: 3em; }
            .choice-btn { width: 75px; height: 75px; font-size: 2em; }
            .choices { gap: 10px; }
            .stats-panel { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>石头 ✊  剪刀 ✌️  布 ✋</h1>
        <p class="subtitle">人机对战 · 多轮循环 · 胜率统计</p>

        <!-- 对战显示区域 -->
        <div class="battle-area">
            <div class="choice-display" id="player-display">
                <div class="choice-label">👤 你</div>
                <div class="choice-emoji" id="player-emoji">🤔</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="choice-display" id="computer-display">
                <div class="choice-label">🤖 电脑</div>
                <div class="choice-emoji" id="computer-emoji">🤔</div>
            </div>
        </div>

        <!-- 结果文字 -->
        <div class="result-text" id="result-text"></div>

        <!-- 连胜提示 -->
        <div style="text-align:center;">
            <span class="streak-badge" id="streak-badge"></span>
        </div>

        <!-- 选择按钮 -->
        <div class="choices">
            <button class="choice-btn" onclick="makeChoice('rock')">
                ✊<span class="btn-label">石头</span>
            </button>
            <button class="choice-btn" onclick="makeChoice('scissors')">
                ✌️<span class="btn-label">剪刀</span>
            </button>
            <button class="choice-btn" onclick="makeChoice('paper')">
                ✋<span class="btn-label">布</span>
            </button>
        </div>

        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">总局数</span>
            </div>
            <div class="stat-card">
                <span class="stat-value win-count" id="stat-win">0</span>
                <span class="stat-label">胜利 🏆</span>
            </div>
            <div class="stat-card">
                <span class="stat-value lose-count" id="stat-lose">0</span>
                <span class="stat-label">失败 😢</span>
            </div>
            <div class="stat-card">
                <span class="stat-value draw-count" id="stat-draw">0</span>
                <span class="stat-label">平局 🤝</span>
            </div>
        </div>

        <!-- 胜率进度条 -->
        <div class="win-rate-bar">
            <div class="win-rate-fill" id="win-rate-fill" style="width: 0%;"></div>
        </div>
        <div style="text-align:center; margin-bottom:20px; color:#aaa; font-size:0.85em;">
            胜率: <span id="win-rate-text" style="color:#42a5f5; font-weight:bold;">0%</span>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <div class="history-title">📋 对战记录</div>
            <div class="history-list" id="history-list">
                <div style="text-align:center;color:#555;padding:20px;">暂无记录，开始对战吧！</div>
            </div>
        </div>

        <!-- 重置按钮 -->
        <button class="btn-reset" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <script>
        const EMOJIS = {
            rock: '✊',
            scissors: '✌️',
            paper: '✋'
        };

        const RESULT_CN = {
            win: '你赢了！🎉',
            lose: '电脑赢了！😢',
            draw: '平局！🤝'
        };

        let winStreak = 0;
        let loseStreak = 0;
        let isAnimating = false;

        async function makeChoice(choice) {
            if (isAnimating) return;
            isAnimating = true;

            // 重置动画类
            document.getElementById('player-emoji').className = 'choice-emoji';
            document.getElementById('computer-emoji').className = 'choice-emoji';

            // 先显示玩家选择
            document.getElementById('player-emoji').textContent = EMOJIS[choice];
            document.getElementById('computer-emoji').textContent = '🤔';

            // 电脑思考动画
            const thinkingEmojis = ['✊', '✌️', '✋'];
            let thinkCount = 0;
            const thinkInterval = setInterval(() => {
                document.getElementById('computer-emoji').textContent = thinkingEmojis[thinkCount % 3];
                thinkCount++;
            }, 120);

            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ choice: choice })
                });

                // 稍微延迟让思考动画更明显
                await new Promise(r => setTimeout(r, 600));
                clearInterval(thinkInterval);

                const data = await response.json();

                // 显示电脑选择
                document.getElementById('computer-emoji').textContent = EMOJIS[data.computer_choice];

                // 添加胜负动画
                if (data.result === 'win') {
                    document.getElementById('player-emoji').classList.add('winner');
                    document.getElementById('computer-emoji').classList.add('loser');
                    winStreak++;
                    loseStreak = 0;
                } else if (data.result === 'lose') {
                    document.getElementById('computer-emoji').classList.add('winner');
                    document.getElementById('player-emoji').classList.add('loser');
                    loseStreak++;
                    winStreak = 0;
                } else {
                    winStreak = 0;
                    loseStreak = 0;
                }

                // 更新结果文字
                const resultEl = document.getElementById('result-text');
                resultEl.textContent = RESULT_CN[data.result];
                resultEl.className = 'result-text ' + data.result;

                // 更新连胜提示
                updateStreakBadge();

                // 更新统计
                updateStats(data.stats);

                // 更新历史
                updateHistory(data.history);

            } catch (error) {
                console.error('请求失败:', error);
                document.getElementById('result-text').textContent = '网络错误，请重试';
                document.getElementById('result-text').className = 'result-text lose';
            }

            isAnimating = false;
        }

        function updateStats(stats) {
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-win').textContent = stats.win;
            document.getElementById('stat-lose').textContent = stats.lose;
            document.getElementById('stat-draw').textContent = stats.draw;

            // 胜率进度条
            document.getElementById('win-rate-fill').style.width = stats.win_rate + '%';
            document.getElementById('win-rate-text').textContent = stats.win_rate + '%';
        }

        function updateHistory(history) {
            const listEl = document.getElementById('history-list');

            if (!history || history.length === 0) {
                listEl.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">暂无记录，开始对战吧！</div>';
                return;
            }

            listEl.innerHTML = history.slice().reverse().map(item => {
                const resultLabel = item.result === 'win' ? '胜' : item.result === 'lose' ? '负' : '平';
                return `
                    <div class="history-item ${item.result}">
                        <span class="history-round">#${item.round}</span>
                        <span class="history-detail">
                            <span>${EMOJIS[item.player]}</span>
                            <span style="color:#666;">vs</span>
                            <span>${EMOJIS[item.computer]}</span>
                        </span>
                        <span class="history-result ${item.result}">${resultLabel}</span>
                    </div>
                `;
            }).join('');
        }

        function updateStreakBadge() {
            const badge = document.getElementById('streak-badge');
            if (winStreak >= 3) {
                badge.textContent = `🔥 ${winStreak} 连胜！势不可挡！`;
                badge.className = 'streak-badge show';
            } else if (loseStreak >= 3) {
                badge.textContent = `💧 ${loseStreak} 连败，加油！`;
                badge.className = 'streak-badge show';
            } else {
                badge.className = 'streak-badge';
            }
        }

        async function resetGame() {
            try {
                const response = await fetch('/api/reset', { method: 'POST' });
                const data = await response.json();

                // 重置界面
                document.getElementById('player-emoji').textContent = '🤔';
                document.getElementById('computer-emoji').textContent = '🤔';
                document.getElementById('player-emoji').className = 'choice-emoji';
                document.getElementById('computer-emoji').className = 'choice-emoji';
                document.getElementById('result-text').textContent = '';
                document.getElementById('result-text').className = 'result-text';

                winStreak = 0;
                loseStreak = 0;
                document.getElementById('streak-badge').className = 'streak-badge';

                updateStats({ total: 0, win: 0, lose: 0, draw: 0, win_rate: 0 });
                updateHistory([]);
            } catch (error) {
                console.error('重置失败:', error);
            }
        }

        // 页面加载时获取初始统计
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                updateStats(data);
                updateHistory(data.history || []);
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 键盘快捷键：1=石头 2=剪刀 3=布
        document.addEventListener('keydown', (e) => {
            const keyMap = { '1': 'rock', '2': 'scissors', '3': 'paper' };
            if (keyMap[e.key] && !isAnimating) {
                makeChoice(keyMap[e.key]);
            }
            if (e.key === 'r' || e.key === 'R') {
                // Ctrl+R 会被浏览器拦截，这里用单独的 R 键重置
                if (!e.ctrlKey && !e.metaKey) {
                    resetGame();
                }
            }
        });

        // 初始化
        loadStats();
    </script>
</body>
</html>
